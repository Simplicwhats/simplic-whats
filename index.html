<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMPLIC Whatsapp</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --bg-main: #0b0f19;
    --bg-card: #111827;
    --bg-input: #1f2937;
    --border-color: #374151;
    --text-main: #f3f4f6;
    --text-muted: #9ca3af;
    --primary: #10b981;
    --primary-hover: #059669;
    --blue: #3b82f6;
    --blue-hover: #2563eb;
    --red: #ef4444;
    --red-hover: #dc2626;
    --orange: #f59e0b;
}

body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
    -webkit-font-smoothing: antialiased;
}

/* LOGIN */
.login {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1e293b 0%, #0b0f19 100%);
}

.box {
    background: var(--bg-card);
    padding: 35px;
    border-radius: 16px;
    width: 340px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.05);
    text-align: center;
}

.box h2 {
    margin-top: 0;
    margin-bottom: 5px;
    color: var(--primary);
    font-size: 24px;
    letter-spacing: -0.5px;
}

.box p {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 25px;
}

/* INPUTS */
input, textarea, select {
    width: 100%;
    padding: 12px 14px;
    margin-top: 12px;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    background: var(--bg-input);
    color: var(--text-main);
    outline: none;
    box-sizing: border-box;
    font-size: 14px;
    transition: all 0.2s ease;
}

input:focus, textarea:focus, select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
}

select {
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 16px;
    padding-right: 40px;
}

.select-status-inline {
    width: auto;
    padding: 6px 30px 6px 10px;
    margin-top: 0;
    font-size: 12px;
    font-weight: 600;
    border-radius: 6px;
    background-position: right 8px center;
    background-size: 12px;
}

/* BUTTONS */
button {
    padding: 11px 16px;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s ease;
}

button:active {
    transform: scale(0.98);
}

.green { background: var(--primary); color: white; }
.green:hover { background: var(--primary-hover); }

.blue { background: var(--blue); color: white; }
.blue:hover { background: var(--blue-hover); }

.red { background: var(--red); color: white; }
.red:hover { background: var(--red-hover); }

.gray { background: #4b5563; color: white; }
.gray:hover { background: #374151; }

.hidden { display: none !important; }

/* LAYOUT CONTAINER */
.container {
    padding: 30px 20px;
    max-width: 1100px;
    margin: auto;
}

.header-app {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.header-app h1 {
    color: var(--primary);
    font-size: 28px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.5px;
}

.user-badge {
    background: var(--bg-card);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    border: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    gap: 8px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
    margin-top: 25px;
}

.card {
    background: var(--bg-card);
    padding: 24px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.03);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
}

.card h3 {
    margin-top: 0;
    margin-bottom: 15px;
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* LIST ROWS */
.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 8px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    font-size: 14px;
}

.row:last-child {
    border-bottom: none;
}

.small {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: normal;
}

/* CUSTOM APP COMPONENTS */
.action-buttons {
    display: flex;
    gap: 8px;
    align-items: center;
}

.btn-icon {
    background: transparent;
    border: none;
    padding: 6px;
    margin: 0;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.badge-status {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    min-width: 60px;
    text-align: center;
}

.badge-info {
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    display: inline-block;
    margin-top: 4px;
}

.radio-custom {
    accent-color: var(--primary);
    width: 16px;
    height: 16px;
    cursor: pointer;
    vertical-align: middle;
    margin-right: 6px;
}

hr {
    border: 0;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    margin: 20px 0;
}

#preview {
    margin-top: 15px;
    color: #e2e8f0;
    font-size: 13px;
    white-space: pre-wrap;
    background: #0f172a;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.03);
    min-height: 40px;
}

.flex-group {
    display: flex;
    gap: 8px;
    margin-top: 4px;
}

/* MODAL STYLES */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    animation: fadeIn 0.2s ease;
}

.modal-content {
    background: var(--bg-card);
    padding: 25px;
    border-radius: 16px;
    width: 420px;
    border: 1px solid var(--border-color);
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    animation: scaleUp 0.2s ease;
}

.modal-content h3 {
    margin-top: 0;
    color: var(--text-main);
    font-size: 18px;
    margin-bottom: 15px;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

@media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div id="login" class="login">
<div class="box">
<h2>SIMPLIC Whatsapp</h2>
<p>Entre com suas credenciais de acesso</p>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button class="green" style="width:100%; margin-top: 18px;" onclick="login()">Entrar</button>
</div>
</div>

<div id="app" class="hidden">

<div class="container">

<div class="header-app">
    <h1>SIMPLIC Whatsapp</h1>
    <div class="user-badge">
        <span style="width: 8px; height: 8px; background: #10b981; border-radius: 50%;"></span>
        <span>Operador: <strong id="lblUsuario" style="color: var(--primary);">---</strong></span>
        <span style="color: var(--border-color)">|</span>
        <a href="#" onclick="logout()" style="color: var(--red); font-size: 12px; text-decoration: none; font-weight: 600;">Sair</a>
    </div>
</div>

<div class="card">
<h3>📱 Gerenciamento de WhatsApp</h3>
<div class="flex-group" style="align-items: flex-end; flex-wrap: wrap;">
    <div style="flex: 2; min-width: 200px;">
        <label class="small">Número do WhatsApp</label>
        <input id="waNumber" placeholder="Ex: 5511999999999" style="margin-top:4px;">
    </div>
    <div style="flex: 1; min-width: 130px;">
        <label class="small">Função</label>
        <select id="waRole" style="margin-top:4px;">
            <option value="preventivo">Preventivo</option>
            <option value="acoes">Ações</option>
            <option value="reserva">Reserva</option>
        </select>
    </div>
    <div style="flex: 1; min-width: 140px;">
        <label class="small">Navegador</label>
        <select id="waBrowser" style="margin-top:4px;">
            <option value="chrome">Google Chrome</option>
            <option value="edge">Microsoft Edge</option>
        </select>
    </div>
    <button class="green" onclick="addWA()" style="margin-top:0; height: 45px; white-space: nowrap;">+ Adicionar</button>
</div>
<div id="waList" style="margin-top: 20px;"></div>
</div>

<div class="grid">

<div class="card">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <h3 style="margin: 0;">👥 Lista de Contatos</h3>
    <button class="green" onclick="abrirModalContatos()" style="margin: 0; padding: 6px 12px; font-size: 12px;">+ Adicionar Números</button>
</div>
<hr style="margin: 10px 0;">
<div style="display: flex; justify-content: space-between; align-items: center;">
    <label class="small">Clientes na Fila de Envio</label>
    <a href="#" onclick="limparContatos()" style="color: var(--red); font-size: 11px; text-decoration: none;">Limpar Tudo</a>
</div>
<div id="lista" style="margin-top: 8px; max-height: 250px; overflow-y: auto;"></div>
</div>

<div class="card">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <h3 style="margin: 0;">📝 Mensagens & Scripts</h3>
    <button class="blue" onclick="abrirModalScriptNovo()" style="margin: 0; padding: 6px 12px; font-size: 12px;">+ Criar Novo Script</button>
</div>
<hr style="margin: 10px 0;">
<label class="small">Seus Scripts Salvos</label>
<div id="scriptsContainerList" style="margin-top: 8px; max-height: 120px; overflow-y: auto;"></div>
<div class="small" style="margin-top: 15px; font-weight: 600;">Visualização do Script Selecionado:</div>
<div id="preview"></div>
</div>

</div>

<div class="card" style="margin-top:25px; text-align: center; border: 1px solid rgba(16, 185, 129, 0.2);">
<button class="green" style="width: 100%; padding: 16px; font-size: 16px; letter-spacing: 0.5px;" onclick="proximo()">
🚀 Próximo Cliente
</button>
</div>

</div>

</div>

<div id="modalContatos" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Importar Contatos para acionar</h3>
        
        <label class="small">Escolha o Script para estes números:</label>
        <select id="modalSelectScriptDefinido" style="margin-top:4px; margin-bottom:12px;">
            </select>

        <label class="small">Cole a lista (Formatos aceitos: 5511999999999;Nome ou apenas 5511999999999)</label>
        <textarea id="telefonesInputModal" rows="6" placeholder="5511999999999;João&#10;5511888888888" style="margin-top:4px;"></textarea>
        
        <div class="flex-group" style="margin-top: 20px;">
            <button class="gray" onclick="fecharModal('modalContatos')" style="flex:1;">Cancelar</button>
            <button class="green" onclick="salvarContatos()" style="flex:1;">Inserir na Fila</button>
        </div>
    </div>
</div>

<div id="modalScript" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="tituloScriptModal">Criar Novo Script</h3>
        <input type="hidden" id="editScriptId" value="">
        
        <label class="small">Título / Identificação do Script</label>
        <input id="nomeScriptModal" placeholder="Ex: Cobrança Atraso 5 dias" style="margin-top:4px; margin-bottom:12px;">
        
        <label class="small">Mensagem de texto (Dica: Use "{nome} tudo bem?" para encaixar com ou sem nome)</label>
        <textarea id="textoScriptModal" rows="5" placeholder="Olá {nome} tudo bem? Vimos aqui que..." style="margin-top:4px Papel;"></textarea>
        
        <div class="flex-group" style="margin-top: 20px;">
            <button class="gray" onclick="fecharModal('modalScript')" style="flex:1;">Cancelar</button>
            <button class="blue" onclick="salvarScript()" style="flex:1;">Salvar Script</button>
        </div>
    </div>
</div>

<div id="modalEditar" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Configurações da Conta</h3>
        
        <label class="small">Número do WhatsApp</label>
        <input id="editModalNumero" placeholder="Ex: 5511999999999" style="margin-top:4px; margin-bottom:12px;">
        
        <label class="small">Quantidade de Acionamentos</label>
        <input id="editModalSent" type="number" min="0" placeholder="Ex: 10" style="margin-top:4px; margin-bottom:12px;">
        
        <div class="flex-group" style="margin-top:0; margin-bottom:12px; gap:12px;">
            <div style="flex:1;">
                <label class="small">Função</label>
                <select id="editModalRole" style="margin-top:4px;">
                    <option value="preventivo">Preventivo</option>
                    <option value="acoes">Ações</option>
                    <option value="reserva">Reserva</option>
                </select>
            </div>
            <div style="flex:1;">
                <label class="small">Navegador</label>
                <select id="editModalBrowser" style="margin-top:4px;">
                    <option value="chrome">Google Chrome</option>
                    <option value="edge">Microsoft Edge</option>
                </select>
            </div>
        </div>

        <label class="small">Status do Canal</label>
        <select id="editModalStatus" onchange="toggleTempoRestritoVisibilidade()" style="margin-top:4px; margin-bottom:12px;">
            <option value="ativo">Ativo</option>
            <option value="restrito">Restrito</option>
            <option value="banido">Banido</option>
        </select>

        <div id="containerTempoRestrito" class="hidden">
            <label class="small">Tempo de Restrição</label>
            <input id="editModalTempo" placeholder="Ex: 3h40m, 45m ou 2 (horas)" style="margin-top:4px;">
        </div>
        
        <div class="flex-group" style="margin-top: 24px;">
            <button class="gray" onclick="fecharModal('modalEditar')" style="flex:1;">Cancelar</button>
            <button class="green" id="btnSalvarEdicao" style="flex:1;">Salvar Alterações</button>
        </div>
    </div>
</div>

<iframe name="whatsapp_window" style="display:none; width:0; height:0; border:none;"></iframe>

<script>
// CONFIGURAÇÕES DO SUPABASE
const SUPABASE_URL = "https://kgidkxaqvgcqiqwqxvut.supabase.co"; 
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnaWRreGFxdmdjcWlxd3F4dnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODc0MzAsImV4cCI6MjA5ODA2MzQzMH0.DLQoO8_q_QeW-a084ZDCFRc0OIeuEDaYpkUg2tSCB0E";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let contatos = [];
let whatsappAccounts = [];
let listaScripts = [];
let contaEditandoIndex = null;
let usuarioLogado = "";
let abaWhatsAppReferencia = null; // Guardará o canal de comunicação direto com a aba externa

function formatRemainingTime(timestamp){
    const diff = timestamp - Date.now();
    if(diff <= 0) return "Liberado";
    const dias = Math.floor(diff / 86400000);
    const horas = Math.floor((diff % 86400000) / 3600000);
    const minutos = Math.floor((diff % 3600000) / 60000);
    const segundos = Math.floor((diff % 60000) / 1000);
    if (dias > 0) return `${dias}d ${horas}h ${minutos}m`;
    return `${horas}h ${minutos}m ${segundos}s`;
}

function abrirModal(id) {
    document.getElementById(id).classList.remove("hidden");
}
function fecharModal(id) {
    document.getElementById(id).classList.add("hidden");
}

function abrirModalContatos() {
    let select = document.getElementById("modalSelectScriptDefinido");
    select.innerHTML = "";
    
    if(listaScripts.length === 0) {
        select.innerHTML = `<option value="">⚠️ Crie um script primeiro!</option>`;
    } else {
        listaScripts.forEach((s, idx) => {
            select.innerHTML += `<option value="${idx}">${s.nome}</option>`;
        });
    }
    abrirModal("modalContatos");
}

function toggleTempoRestritoVisibilidade() {
    let status = document.getElementById("editModalStatus").value;
    let container = document.getElementById("containerTempoRestrito");
    container.classList.toggle("hidden", status !== "restrito");
}

/* LOGIN REAL COM BANCO DE DADOS */
async function login(){
    let userDigitado = document.getElementById("user").value.trim();
    let passDigitado = document.getElementById("pass").value.trim();

    if (userDigitado === "Levi" && passDigitado === "2104") {
        usuarioLogado = "Levi";
    } else if (userDigitado === "Mariana" && passDigitado === "123mudar") {
        usuarioLogado = "Mariana";
    } else {
        return alert("Login ou senha inválidos");
    }

    document.getElementById("lblUsuario").innerText = usuarioLogado;
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    
    document.getElementById("user").value = "";
    document.getElementById("pass").value = "";

    await syncLoadAll();
}

function logout() {
    usuarioLogado = "";
    whatsappAccounts = [];
    contatos = [];
    listaScripts = [];
    abaWhatsAppReferencia = null;
    document.getElementById("app").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}

/* SYNC & LOAD COM SUPABASE */
async function syncLoadAll() {
    if(!usuarioLogado) return;

    try {
        let resWa = await supabaseClient.from('whatsapp_accounts').select('*').eq('operator_name', usuarioLogado).order('id', { ascending: true });
        whatsappAccounts = resWa.data || [];

        let resScr = await supabaseClient.from('message_scripts').select('*').eq('operator_name', usuarioLogado).order('id', { ascending: true });
        listaScripts = resScr.data || [];

        let resCon = await supabaseClient.from('contacts_queue').select('*').eq('operator_name', usuarioLogado).order('id', { ascending: true });
        contatos = resCon.data || [];

        renderWA();
        renderScripts();
        renderContatos();
    } catch (error) {
        console.error("Erro na sincronização:", error);
    }
}

/* GERENCIAMENTO DE WHATSAPP VIA BANCO */
async function addWA(){
    let num = document.getElementById("waNumber").value.trim();
    let role = document.getElementById("waRole").value;
    let browser = document.getElementById("waBrowser").value;
    if(!num) return alert("Digite um número válido");

    let isFirst = whatsappAccounts.length === 0;

    await supabaseClient.from('whatsapp_accounts').insert([{
        operator_name: usuarioLogado,
        number: num,
        sent: 0,
        selected: isFirst,
        status: "ativo",
        role: role,
        browser: browser
    }]);

    document.getElementById("waNumber").value = "";
    await syncLoadAll();
}

function renderWA(){
    let html = "";
    whatsappAccounts.forEach((w, i)=>{
        let color = "#10b981";
        let statusText = w.status;
        if(w.status === "restrito"){
            color = "#f59e0b";
            if(w.restricted_until) statusText = "restrito: " + formatRemainingTime(Number(w.restricted_until));
        }
        if(w.status === "banido") color = "#ef4444";

        let roleLabels = { preventivo: "Preventivo", acoes: "Ações", reserva: "Reserva" };
        let roleColors = { preventivo: "#3b82f6", acoes: "#ef4444", reserva: "#f59e0b" };
        let browserLabels = { chrome: "Google Chrome", edge: "Microsoft Edge" };
        let currentRole = w.role || "preventivo";
        let currentBrowser = w.browser || "chrome";

        html += `
        <div class="row" style="align-items: flex-start; padding: 14px 8px;">
            <div>
                <div style="display: flex; align-items: center;">
                    <input type="radio" name="wa" class="radio-custom" onchange="selectWA(${w.id})" ${w.selected ? "checked" : ""}>
                    <span style="cursor:pointer; font-weight:600;" onclick="abrirEditarModal(${i})">${w.number}</span>
                    <span class="small" style="margin-left: 4px;">(${w.sent} envios)</span>
                </div>
                <div style="margin-left: 26px; display: flex; gap: 6px;">
                    <span class="badge-info" style="background: ${roleColors[currentRole]}20; color: ${roleColors[currentRole]}; border: 1px solid ${roleColors[currentRole]}30;">${roleLabels[currentRole]}</span>
                    <span class="badge-info" style="background: #4b556320; color: #e5e7eb; border: 1px solid #4b556340;">💻 ${browserLabels[currentBrowser]}</span>
                </div>
            </div>
            <div class="action-buttons">
                <span id="badge-status-${i}" class="badge-status" style="background: ${color}20; color: ${color}; border: 1px solid ${color}40;">${statusText}</span>
                <select class="select-status-inline" onchange="alterarStatusRapido(${w.id}, ${i}, this.value)">
                    <option value="ativo" ${w.status === 'ativo' ? 'selected' : ''}>Ativo</option>
                    <option value="restrito" ${w.status === 'restrito' ? 'selected' : ''}>Restrito</option>
                    <option value="banido" ${w.status === 'banido' ? 'selected' : ''}>Banido</option>
                </select>
                <button onclick="abrirEditarModal(${i})" class="btn-icon" style="color:#3b82f6;">📝</button>
                <button onclick="removeWA(${w.id})" class="btn-icon" style="color:#ef4444;">✕</button>
            </div>
        </div>`;
    });
    document.getElementById("waList").innerHTML = html;
}

async function selectWA(id){
    await supabaseClient.from('whatsapp_accounts').update({ selected: false }).eq('operator_name', usuarioLogado);
    await supabaseClient.from('whatsapp_accounts').update({ selected: true }).eq('id', id);
    await syncLoadAll();
}

async function alterarStatusRapido(id, i, statusAlvo) {
    if(statusAlvo === "restrito") {
        abrirEditarModal(i);
        document.getElementById("editModalStatus").value = "restrito";
        toggleTempoRestritoVisibilidade();
    } else {
        await supabaseClient.from('whatsapp_accounts').update({ status: statusAlvo, restricted_until: null }).eq('id', id);
        await syncLoadAll();
    }
}

function abrirEditarModal(i) {
    contaEditandoIndex = i;
    let conta = whatsappAccounts[i];
    document.getElementById("editModalNumero").value = conta.number;
    document.getElementById("editModalSent").value = conta.sent;
    document.getElementById("editModalStatus").value = conta.status;
    document.getElementById("editModalRole").value = conta.role || "preventivo";
    document.getElementById("editModalBrowser").value = conta.browser || "chrome";
    document.getElementById("editModalTempo").value = "";
    toggleTempoRestritoVisibilidade();
    
    document.getElementById("btnSalvarEdicao").onclick = async function() {
        let novoNumero = document.getElementById("editModalNumero").value.trim();
        let novosAcionamentos = parseInt(document.getElementById("editModalSent").value.trim());
        let novoStatus = document.getElementById("editModalStatus").value;
        let novaRole = document.getElementById("editModalRole").value;
        let novoBrowser = document.getElementById("editModalBrowser").value;
        
        if(!novoNumero) return alert("Número inválido!");
        if(isNaN(novosAcionamentos) || novosAcionamentos < 0) return alert("Quantidade inválida!");
        
        let restUntilValue = null;
        
        if(novoStatus === "restrito") {
            let inputTempo = document.getElementById("editModalTempo").value;
            if(inputTempo) {
                inputTempo = inputTempo.trim().toLowerCase().replace(/\s+/g, '');
                let milissegundosTotais = 0;
                let encontrouFormato = false;
                let matchHoras = inputTempo.match(/(\d+(?:\.\d+)?)hcard/);
                if(matchHoras) { milissegundosTotais += parseFloat(matchHoras[1]) * 3600000; encontrouFormato = true; }
                let matchMinutos = inputTempo.match(/(\d+(?:\.\d+)?)m/);
                if(matchMinutos) { milissegundosTotais += parseFloat(matchMinutos[1]) * 60000; encontrouFormato = true; }
                if(!encontrouFormato) {
                    let valorPuro = parseFloat(inputTempo);
                    if(!isNaN(valorPuro) && valorPuro > 0) { milissegundosTotais = valorPuro * 3600000; encontrouFormato = true; }
                }
                if(encontrouFormato && milissegundosTotais > 0) {
                    restUntilValue = Date.now() + milissegundosTotais;
                } else {
                    novoStatus = "ativo";
                }
            } else if (conta.restricted_until) {
                restUntilValue = conta.restricted_until;
            } else {
                novoStatus = "ativo";
            }
        }
        
        await supabaseClient.from('whatsapp_accounts').update({
            number: novoNumero,
            sent: novosAcionamentos,
            status: novoStatus,
            role: novaRole,
            browser: novoBrowser,
            restricted_until: restUntilValue
        }).eq('id', conta.id);

        fecharModal("modalEditar");
        await syncLoadAll();
    };
    abrirModal("modalEditar");
}

async function removeWA(id){
    if(!confirm("Tem certeza que deseja remover esta conta?")) return;
    await supabaseClient.from('whatsapp_accounts').delete().eq('id', id);
    await syncLoadAll();
}

/* GERENCIAMENTO DE FILA DE CONTATOS */
async function salvarContatos(){
    let scriptIdx = document.getElementById("modalSelectScriptDefinido").value;
    if(scriptIdx === "") return alert("Você precisa selecionar um script válido para vincular a estes números.");
    
    let scriptVinculado = listaScripts[scriptIdx];
    let rawInput = document.getElementById("telefonesInputModal").value;
    let listagemNovos = rawInput.split("\n").map(x => x.trim()).filter(x => x);

    if(listagemNovos.length === 0) return alert("Insira pelo menos um número de telefone.");

    let packageData = listagemNovos.map(linha => {
        let partes = linha.split(";");
        let numero = partes[0].trim();
        let nomeCliente = partes[1] ? partes[1].trim() : "";

        let textoCustomizado = scriptVinculado.texto;

        if(nomeCliente) {
            textoCustomizado = textoCustomizado.replace(/\{nome\}/gi, nomeCliente);
        } else {
            textoCustomizado = textoCustomizado.replace(/\{nome\}/gi, "");
            textoCustomizado = textoCustomizado.replace(/Olá\s+/gi, "Olá, ");
            textoCustomizado = textoCustomizado.replace(/\s{2,}/g, " ");
        }

        return {
            operator_name: usuarioLogado,
            tel: numero,
            status: "Pendente",
            script_texto: textoCustomizado, 
            script_nome: scriptVinculado.nome
        };
    });

    await supabaseClient.from('contacts_queue').insert(packageData);

    document.getElementById("telefonesInputModal").value = "";
    fecharModal("modalContatos");
    await syncLoadAll();
}

async function limparContatos(){
    if(!confirm("Remover todos os clientes da fila?")) return;
    await supabaseClient.from('contacts_queue').delete().eq('operator_name', usuarioLogado);
    await syncLoadAll();
}

async function removerContatoFila(id){
    await supabaseClient.from('contacts_queue').delete().eq('id', id);
    await syncLoadAll();
}

function renderContatos(){
    let html = "";
    if (contatos.length === 0) {
        html = `<div class="small" style="text-align:center; padding:12px; color:var(--text-muted);">Nenhum número na fila. Clique acima para adicionar.</div>`;
        document.getElementById("lista").innerHTML = html;
        return;
    }

    contatos.forEach((c) => {
        let corStatus = c.status === "Enviado" ? "#10b981" : "#9ca3af";
        html += `
        <div class="row" style="padding: 10px 6px;">
            <div>
                <span style="font-weight:600;">${c.tel}</span>
                <div class="small" style="color: var(--blue); font-size:11px; margin-top:2px;">📋 Script: ${c.script_nome || 'Padrão'}</div>
            </div>
            <div class="action-buttons">
                <span style="color: ${corStatus}; font-weight: 600; font-size: 11px; text-transform: uppercase;">${c.status}</span>
                <button onclick="removerContatoFila(${c.id})" class="btn-icon" style="color:#ef4444;">✕</button>
            </div>
        </div>`;
    });
    document.getElementById("lista").innerHTML = html;
}

/* GERENCIAMENTO DE SCRIPTS (FIXED EDIT LOGIC) */
function abrirModalScriptNovo() {
    document.getElementById("tituloScriptModal").innerText = "Criar Novo Script";
    document.getElementById("editScriptId").value = ""; // Limpa ID indicando criação
    document.getElementById("nomeScriptModal").value = "";
    document.getElementById("textoScriptModal").value = "";
    abrirModal("modalScript");
}

async function salvarScript(){
    let idExistente = document.getElementById("editScriptId").value;
    let nome = document.getElementById("nomeScriptModal").value.trim();
    let texto = document.getElementById("textoScriptModal").value.trim();
    
    if(!nome || !texto) return alert("Preencha todos os campos do script");

    if (idExistente) {
        // Modo Edição: Atualiza direto no ID sem deletar nada
        await supabaseClient.from('message_scripts').update({ nome: nome, texto: texto }).eq('id', idExistente);
    } else {
        // Modo Criação: Insere um novo registro
        let isFirst = listaScripts.length === 0;
        await supabaseClient.from('message_scripts').insert([{
            operator_name: usuarioLogado,
            nome: nome,
            texto: texto,
            selected: isFirst
        }]);
    }
    
    fecharModal("modalScript");
    await syncLoadAll();
}

function renderScripts() {
    let html = "";
    if (listaScripts.length === 0) {
        html = `<div class="small" style="text-align:center; padding:10px; color:var(--text-muted);">Nenhum script criado.</div>`;
        document.getElementById("scriptsContainerList").innerHTML = html;
        document.getElementById("preview").innerText = "";
        return;
    }

    listaScripts.forEach((s) => {
        // Envelopamento seguro de string para evitar erros no HTML onClick
        let textoEscapado = encodeURIComponent(s.texto);
        html += `
        <div class="row" style="padding: 8px 6px;">
            <div style="display: flex; align-items: center; flex: 1; cursor: pointer;" onclick="selectScript(${s.id})">
                <input type="radio" name="scriptSelect" class="radio-custom" ${s.selected ? "checked" : ""}>
                <span style="font-weight: 600; color: ${s.selected ? 'var(--blue)' : 'var(--text-main)'};">${s.nome}</span>
            </div>
            <div class="action-buttons">
                <button onclick="prepararEdicaoScript(${s.id}, '${s.nome.replace(/'/g, "\\'")}', '${textoEscapado}')" class="btn-icon" style="color:#3b82f6;">📝</button>
                <button onclick="removerScript(${s.id})" class="btn-icon" style="color:#ef4444;">✕</button>
            </div>
        </div>`;
    });

    document.getElementById("scriptsContainerList").innerHTML = html;
    previewScript();
}

function prepararEdicaoScript(id, nome, textoCodificado) {
    document.getElementById("tituloScriptModal").innerText = "Editar Script";
    document.getElementById("editScriptId").value = id; // Define o ID para indicar atualização
    document.getElementById("nomeScriptModal").value = nome;
    document.getElementById("textoScriptModal").value = decodeURIComponent(textoCodificado);
    abrirModal("modalScript");
}

async function selectScript(id) {
    await supabaseClient.from('message_scripts').update({ selected: false }).eq('operator_name', usuarioLogado);
    await supabaseClient.from('message_scripts').update({ selected: true }).eq('id', id);
    await syncLoadAll();
}

async function removerScript(id){
    if(!confirm("Deseja deletar este script?")) return;
    await supabaseClient.from('message_scripts').delete().eq('id', id);
    await syncLoadAll();
}

function previewScript(){
    let scriptAtivo = listaScripts.find(x => x.selected);
    document.getElementById("preview").innerText = scriptAtivo ? scriptAtivo.texto : "Nenhum script selecionado.";
}

/* PROXIMO ACIONAMENTO - CONTROLE AVANÇADO DE JANELA ÚNICA */
async function proximo(){
    let wa = whatsappAccounts.find(x => x.selected);
    if(!wa) return alert("Selecione uma conta de WhatsApp de envio.");
    if(wa.status === "banido") return alert("O WhatsApp selecionado está banido!");
    
    if(wa.status === "restrito"){
        if(wa.restricted_until && Date.now() < Number(wa.restricted_until)){
            return alert("WhatsApp restrito.\nTempo restante: " + formatRemainingTime(Number(wa.restricted_until)));
        } else {
            wa.status = "ativo";
            await supabaseClient.from('whatsapp_accounts').update({ status: 'ativo', restricted_until: null }).eq('id', wa.id);
        }
    }

    let proximoContato = contatos.find(c => c.status === "Pendente");
    if(!proximoContato) return alert("Todos os contatos da lista já foram processados!");

    let textoMensagem = proximoContato.script_texto;
    if(!textoMensagem) {
        let scriptGeral = listaScripts.find(x => x.selected);
        if(!scriptGeral) return alert("Nenhum script foi definido ou localizado para este contato.");
        textoMensagem = scriptGeral.texto;
    }

    // Atualiza contato para Enviado no banco
    await supabaseClient.from('contacts_queue').update({ status: 'Enviado' }).eq('id', proximoContato.id);

    // ESTRATÉGIA ANTI-MÚLTIPLAS ABAS:
    // Se a referência à aba ainda não existe ou foi fechada, cria a aba fixa pela primeira vez.
    let urlDisparo = "https://web.whatsapp.com/send?phone=" + proximoContato.tel + "&text=" + encodeURIComponent(textoMensagem);
    
    if (!abaWhatsAppReferencia || abaWhatsAppReferencia.closed) {
        abaWhatsAppReferencia = window.open(urlDisparo, "whatsapp_janela_unica");
    } else {
        // Se a aba já existe, nós atualizamos o link dela diretamente via script de forma forçada.
        abaWhatsAppReferencia.location.href = urlDisparo;
        abaWhatsAppReferencia.focus(); // Traz a aba para frente se o navegador permitir
    }

    // Incrementa contador de envios do chip
    await supabaseClient.from('whatsapp_accounts').update({ sent: wa.sent + 1 }).eq('id', wa.id);

    await syncLoadAll();
}

// TIMERS DE ATUALIZAÇÃO EM SEGUNDO PLANO
setInterval(async () => {
    if (!usuarioLogado) return; 
    let alterouSessao = false;

    for (let w of whatsappAccounts) {
        if (w.status === "restrito" && w.restricted_until) {
            if (Date.now() >= Number(w.restricted_until)) {
                await supabaseClient.from('whatsapp_accounts').update({ status: 'ativo', restricted_until: null }).eq('id', w.id);
                alterouSessao = true;
            }
        }
    }

    if (alterouSessao) {
        await syncLoadAll();
    } else {
        whatsappAccounts.forEach((w, i) => {
            let elementoBadge = document.getElementById(`badge-status-${i}`);
            if (elementoBadge && w.status === "restrito" && w.restricted_until) {
                elementoBadge.innerText = "restrito: " + formatRemainingTime(Number(w.restricted_until));
            }
        });
    }
}, 1000);
